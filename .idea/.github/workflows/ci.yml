name: System Ci

on: [push,pull_request]

jobs:
  builds:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
  steps:
    -uses: actions/checkout@v4
    -uses: actions/setup-java@v4
    with:
      java-version: '25'
      distribution: 'temurin'
      cache: 'maven'
    -run: mvn package
