name: System Ci

on: [push, pull_request]

jobs:
  # Cross-platform build only (no tests) — verifies the project compiles and the
  # server/client JARs package on every target OS. Fast because it skips the
  # MySQL-dependent test suite.
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build (skip tests)
        run: mvn -B --no-transfer-progress -DskipTests package

  # Tests run once on Linux against a real MySQL service container. Service
  # containers only run on Linux runners, and the test layer is OS-independent,
  # so there is no need to repeat it on Windows/macOS.
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: auction_db
          MYSQL_USER: auction_user
          MYSQL_PASSWORD: Auction123
          MYSQL_ROOT_PASSWORD: root123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot123"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
          --health-start-period=40s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: '3306'
          DB_NAME: auction_db
          DB_USER: auction_user
          DB_PASSWORD: Auction123
        run: mvn -B --no-transfer-progress test
