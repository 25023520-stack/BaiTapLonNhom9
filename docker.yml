services:
  mysql:
    image: mysql:8.0
    container_name: auction_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: auction_db
      MYSQL_USER: auction_user
      MYSQL_PASSWORD: Auction@123456
    ports:
      - "3306:3306"
    volumes:
      - ./src/main/resources/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
