services:
  mysql:
    image: mysql:8.4
    container_name: auction_db
    command: --bind-address=0.0.0.0
    environment:
      MYSQL_DATABASE: auction_db
      MYSQL_USER: auction_user
      MYSQL_PASSWORD: Auction123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
  server:
    build: .
    container_name: auction_server
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: auction_db
      DB_USER: auction_user
      DB_PASSWORD: Auction123
    ports:
      - "5050:5050"
volumes:
  db_data:
